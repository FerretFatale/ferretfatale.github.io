<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FerretFatale</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #30363d;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.8rem;
      color: #e6edf3;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border-radius: 6px;
      background-color: #21262d;
      color: #c9d1d9;
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid #30363d;
      transition: background-color 0.2s, border-color 0.2s, color 0.2s;
    }

    .links a:hover {
      background-color: #30363d;
      border-color: #8b949e;
      color: #e6edf3;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.78rem;
      color: #6e7681;
    }
  </style>
</head>
<body>
  <div class="card">
    <img
      class="avatar"
      src="https://github.com/FerretFatale.png"
      alt="FerretFatale avatar"
    />
    <h1>FerretFatale</h1>
    <p class="tagline">Welcome to my GitHub Pages site.</p>
    <div class="links">
      <a href="https://github.com/FerretFatale" target="_blank" rel="noopener noreferrer">
        <!-- GitHub icon -->
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
            -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87
            2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
            0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
            0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09
            2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08
            2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65
            3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01
            2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub
      </a>
    </div>
  </div>
  <footer>
    &copy; <span id="year"></span> FerretFatale
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
